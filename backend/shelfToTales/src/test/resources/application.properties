spring.datasource.url=jdbc:h2:mem:shelftotalesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
spring.flyway.enabled=false

# Disable HTTPS-only redirect for MockMvc tests (which use HTTP)
app.security.require-https=false

# Tests don't ship with R2 creds; opt out of the boot-time health check.
r2.required=false

# JWT (test-only key — never use in production)
jwt.secret-key=test-secret-key-for-unit-tests-only-must-be-at-least-32-bytes-long
ai.spam.provider=llm