name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/shelfToTales
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests compile

      - name: Test
        run: ./mvnw -B -ntp test

      - name: Package (skip tests, already ran)
        run: ./mvnw -B -ntp -DskipTests package

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/shelfToTales/target/*.jar
          if-no-files-found: warn
          retention-days: 7

  frontend-next:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: frontend-next/.next
          if-no-files-found: warn
          retention-days: 7

  e2e:
    name: End-to-End Tests (Playwright)
    needs: [backend, frontend-next]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Start Docker Compose services
        run: docker compose up -d

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/shelfToTales/target

      - name: Start Spring Boot Backend
        run: |
          export JWT_SECRET_KEY=my_very_long_secret_key_of_at_least_32_characters_for_ci_only
          nohup java -jar backend/shelfToTales/target/*.jar > backend.log 2>&1 &
          echo "Waiting for backend to start..."
          timeout 60s bash -c "until curl -sf http://localhost:8080/actuator/health; do sleep 2; done" || (cat backend.log && exit 1)
          echo "Backend started successfully!"

      - name: Install frontend dependencies
        run: |
          cd frontend-next
          npm install --no-audit --no-fund --legacy-peer-deps

      - name: Download frontend next build
        uses: actions/download-artifact@v4
        with:
          name: frontend-next-build
          path: frontend-next/.next

      - name: Install Playwright Browsers
        run: |
          cd frontend-next
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        run: |
          cd frontend-next
          npm run test:e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend-next/playwright-report/
          retention-days: 7

